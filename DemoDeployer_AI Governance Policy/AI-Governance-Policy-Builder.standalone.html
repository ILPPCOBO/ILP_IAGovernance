 de IA?"),options:[x("internal","Internally","Internamente"),x("clients","To clients/customers","A clientes"),x("public","In public-facing content","En contenido público"),x("media","When generating images/audio/video","Al generar imágenes/audio/vídeo"),x("decisions","When making decisions based on AI output","Al tomar decisiones basadas en IA"),x("regulated","When using AI in regulated work","Al usar IA en trabajo regulado")]},{id:"incidentProcess",category:"G",type:"multi",weight:6,prompt:M("For which situations does the company have a reporting process?","¿Para qué situaciones tiene la empresa un proceso de reporte?"),options:[x("sensitiveUpload","Accidental upload of sensitive data","Subida accidental de datos sensibles"),x("inaccurate","Inaccurate AI output","Resultado de IA inexacto"),x("biased","Discriminatory or biased output","Resultado discriminatorio o sesgado"),x("hallucinated","Hallucinated legal/financial/technical content","Contenido legal/financiero/técnico alucinado"),x("security","Security incident","Incidente de seguridad"),x("vendorOutage","Vendor outage","Caída de proveedor"),x("unauthorizedTool","Unauthorized AI tool use","Uso de herramienta de IA no autorizada"),x("misuse","Employee misuse","Mal uso por empleados"),x("clientComplaint","Client complaint","Queja de cliente")]},{id:"vendorReview",category:"H",type:"multi",weight:6,prompt:M("What does the company review AI vendors for?","¿Qué revisa la empresa de los proveedores de IA?"),options:[x("dataProcessing","Data processing terms","Términos de tratamiento de datos"),x("training","Training on customer data","Entrenamiento con datos de clientes"),x("subprocessors","Subprocessors","Subencargados"),x("dataLocation","Data location","Ubicación de los datos"),x("security","Security certifications","Certificaciones de seguridad"),x("retention","Retention / deletion","Retención / eliminación"),x("audit","Audit rights","Derechos de auditoría"),x("incidentNotice","Incident notification","Notificación yee scoring","Vigilancia o puntuación de empleados"),x("noHumanReview","Using AI outputs without human review","Usar resultados de IA sin revisión humana"),x("credentials","Entering credentials, passwords, API keys or secrets","Introducir credenciales, contraseñas, claves API o secretos"),x("unapprovedTools","Using unapproved tools","Usar herramientas no aprobadas")]}],am=[{id:"chatgpt",name:"ChatGPT",kind:"chatbot",publicByDefault:!0,note:{en:"Public/free tiers may use inputs to improve models unless settings/enterprise terms say otherwise.",es:"Las versiones públicas/gratuitas pueden usar las entradas para mejorar modelos salvo configuración/términos empresariales."}},{id:"copilot",name:"Microsoft Copilot",kind:"assistant",publicByDefault:!1,note:{en:"Enterprise (M365) Copilot offers commercial data protection; consumer Copilot does not.",es:"Copilot empresarial (M365) ofrece protección de datos comercial; el Copilot de consumo no."}},{id:"gemini",name:"Google Gemini",kind:"chatbot",publicByDefault:!0,note:{en:"Consumer Gemini may retain conversations; Workspace/enterprise terms differ.",es:"Gemini de consumo puede retener conversaciones; los términos de Workspace/empresa difieren."}},{id:"claude",name:"Claude",kind:"chatbot",publicByDefault:!0,note:{en:"Consumer tiers vs. Team/Enterprise/API have different data-use defaults.",es:"Las versiones de consumo frente a Team/Enterprise/API tienen distintos valores de uso de datos."}},{id:"perplexity",name:"Perplexity",kind:"search",publicByDefault:!0,note:{en:"AI research/search tool; outputs can be inaccurate and must be verified.",es:"Herramienta de búsqueda/investigación con IA; los resultados pueden ser inexactos y deben verificarse."}},{id:"midjourney",name:"Midjourney",kind:"image",publicByDefault:!0,note:{en:"Image generation; IP/licensing and disclosure considerations apply.",es:"Generación de imágenes; aplican consideraciones de PI/licencia y divulgación."}},{id:"dalle",name:"DALL·E",kind:"image",publicByDefault:!0,note:{en:"Image generation; review output rights and disclosure for synthetic media.",es:"Generación de imágenes; revise derechos de uso y divulgación de contenido sintético."}},{id:"notion-ai",name:"Notion AI",kind:"embedded",publicByDefault:!1,note:{en:"AI embedded in a SaaS workspace; data scope follows the underlying workspace.",es:"IA integrada en un espacio SaaS; el alcance de datos sigue al espacio subyacente."}},{id:"grammarly",name:"Grammarly",kind:"embedded",publicByDefault:!0,note:{en:"Processes text you write, including potentially sensitive drafts.",es:"Procesa el texto que escribe, incluidos posibles borradores sensibles."}},{id:"meeting-assistants",name:"Otter / Fireflies / meeting assistants",kind:"transcription",publicByDefault:!0,note:{en:"Recording/transcription raises consent, confidentiality and retention issues.",es:"La grabación/transcripción plantea cuestiones de consentimiento, confidencialidad y retención."}},{id:"github-copilot",name:"GitHub Copilot",kind:"code",publicByDefault:!1,note:{en:"AI coding tool; source-code exposure and license/IP review needed.",es:"Herramienta de programación con IA; requiere revisión de exposición de código y licencias/PI."}},{id:"saas-embedded",name:"AI embedded in SaaS platforms",kind:"embedded",publicByDefault:!1,note:{en:"AI features bundled into existing SaaS; review each platform's data terms.",es:"Funciones de IA incluidas en SaaS existente; revise los términos de datos de cada plataforma."}},{id:"custom-internal",name:"Custom / internal AI tools",kind:"custom",publicByDefault:!1,note:{en:"Internally built/hosted AI; governance depends on your own controls.",es:"IA construida/alojada internamente; la gobernanza depende de sus propios controles."}}],b=(e,n)=>({en:e,es:n}),om={"purposeScope.base":b("This policy sets out how employees and contractors may use generative AI tools at {company}. It is a preliminary, internal draft and should be reviewed and adapted by qualified professionals before implementation.","Esta política establece cómo los empleados y contratistas pueden usar herramientas de IA generativa en {company}. Es un borrador interno preliminar y debe ser revisado y adaptado por profesionales cualificados antes de su implementación."),"purposeScope.regulated":b("Because {company} operates in a regulated sector, AI use in regulated activities is subject to additional controls and to applicable sector rules.","Dado que {company} opera en un sector regulado, el uso de IA en actividades reguladas está sujeto a controles adicionales y a las normas sectoriales aplicables."),"applies.base":b("This policy applies to all employees, contractors, interns and third parties who use AI tools on behalf of {company} or with company data.","Esta política se aplica a todos los empleados, contratistas, becarios y terceros que usen herramientas de IA en nombre de {company} o con datos de la empresa."),"approvedTools.base":b("Only AI tools that appear on the company's approved-tools list, with the status and conditions stated there, may be used for company work.","Solo pueden usarse para el trabajo de la empresa las herramientas de IA que figuren en la lista de herramientas aprobadas, con el estado y las condiciones allí indicados."),"approvedTools.unknownStatus":b("Several tools currently in use have an undefined status. Until each is reviewed and classified, treat it as restricted and do not enter sensitive data.","Varias herramientas en uso tienen un estado indefinido. Hasta que cada una se revise y clasifique, trátela como restringida y no introduzca datos sensibles."),"approvedTools.personalAccounts":b("Personal AI accounts must not be used for company work where company-managed accounts are available; this helps preserve confidentiality and audit ability.","No deben usarse cuentas personales de IA para el trabajo de la empresa cuando existan cuentas gestionadas por la empresa; esto ayuda a preservar la confidencialidad y la trazabilidad."),"permittedUses.base":b("Subject to the rules below, employees may use approved AI tools for low-risk productivity tasks such as drafting, summarizing, brainstorming and reformatting non-sensitive content.","Sujeto a las reglas siguientes, los empleados pueden usar herramientas de IA aprobadas para tareas de productividad de bajo riesgo como redactar, resumir, generar ideas y reformatear contenido no sensible."),"restrictedUses.base":b("Higher-risk uses are permitted only with the controls in this policy: human review, no sensitive data, and disclosure where required.","Los usos de mayor riesgo solo se permiten con los controles de esta política: revisión humana, sin datos sensibles y divulgación cuando se requiera."),"restrictedUses.code":b("AI coding tools may be used for non-confidential code, but generated code must be reviewed before deployment and must not include secrets or proprietary source unless the tool is approved for that purpose.","Las herramientas de IA para programación pueden usarse con código no confidencial, pero el código generado debe revisarse antes del despliegue y no debe incluir secretos ni código propietario salvo que la herramienta esté aprobada para ello."),"restrictedUses.media":b("AI-generated images, audio or video must be reviewed for accuracy and IP risk and disclosed as synthetic where required.","Las imágenes, audio o vídeo generados por IA deben revisarse por exactitud y riesgo de PI y divulgarse como sintéticos cuando se requiera."),"prohibitedUses.base":b("The following are prohibited: entering credentials, passwords, API keys or secrets into AI tools; using AI to produce deceptive content, impersonation or deepfakes; and presenting AI output as final professional advice without review.","Queda prohibido: introducir credenciales, contraseñas, claves API o secretos en herramientas de IA; usar IA para producir contenido engañoso, suplantación o deepfakes; y presentar resultados de IA como asesoramiento profesional final sin revisión."),"prohibitedUses.confidentialPublic":b("Uploading confidential, client, personal or trade-secret data to public/free AI tools is prohibited unless an approved, enterprise-grade tool with suitable contractual terms is used.","Está prohibido subir datos confidenciales, de clientes, personales o secretos comerciales a herramientas de IA públicas/gratuitas, salvo que se use una herramienta empresarial aprobada con términos contractuales adecuados."),"prohibitedUses.finalDecisions":b("AI must not be used to make final legal, medical, financial, HR or compliance decisions without qualified human judgment.","La IA no debe usarse para tomar decisiones finales legales, médicas, financieras, de RR. HH. o de cumplimiento sin juicio humano cualificado."),"prohibitedUses.automatedHiring":b("Fully automated hiring decisions and employee surveillance/scoring using AI are prohibited without explicit approval, a documented lawful basis and human oversight.","Quedan prohibidas las decisiones de contratación totalmente automatizadas y la vigilancia/puntuación de empleados mediante IA sin aprobación explícita, base legal documentada y supervisión humana."),"sensitiveData.base":b("Do not enter sensitive data into AI tools unless the specific tool is approved for that data type. Sensitive data includes personal data, client data, confidential information, trade secrets, source code, contracts, legal/privileged material, financial data and regulated data.","No introduzca datos sensibles en herramientas de IA salvo que la herramienta concreta esté aprobada para ese tipo de dato. Los datos sensibles incluyen datos personales, datos de clientes, información confidencial, secretos comerciales, código fuente, contratos, material legal/privilegiado, datos financieros y datos regulados."),"sensitiveData.health":b("Health data must never be entered into AI tools that are not specifically approved and contracted for health data, given heightened legal sensitivity.","Los datos de salud nunca deben introducirse en herramientas de IA que no estén específicamente aprobadas y contratadas para datos de salud, dada su mayor sensibilidad legal."),"sensitiveData.children":b("Children's data must not be entered into AI tools; this requires specific legal review before any processing.","Los datos de menores no deben introducirse en herramientas de IA; esto requiere una revisión legal específica antes de cualquier tratamiento."),"confidentiality.base":b("Treat anything entered into an AI tool as potentially disclosed outside the company. Do not enter information you would not be comfortable sharing with an external third party absent appropriate contractual protection.","Considere que todo lo que introduce en una herramienta de IA puede divulgarse fuera de la empresa. No introduzca información que no compartiría con un tercero externo sin la protección contractual adecuada."),"personalData.base":b("Personal data may only be processed with AI where there is a lawful basis, data-minimization is applied and the tool's terms permit such processing. When in doubt, consult the DPO or legal team.","Los datos personales solo pueden tratarse con IA cuando exista una base legal, se aplique la minimización de datos y los términos de la herramienta permitan dicho tratamiento. En caso de duda, consulte al DPO o al equipo jurídico."),"ipOutput.base":b("AI outputs may carry intellectual-property and accuracy risks. Verify originality and rights before publishing or relying on AI-generated content, and do not assume ownership of generated material.","Los resultados de IA pueden conllevar riesgos de propiedad intelectual y exactitud. Verifique la originalidad y los derechos antes de publicar o confiar en contenido generado por IA, y no asuma la titularidad del material generado."),"humanReview.base":b("A qualified person must review AI output before it is used in any external, legal, financial, employment, regulated or high-impact context. AI assists; humans remain accountable.","Una persona cualificada
